{% extends 'base.html' %}

{% block title %}Edit Department - WorkSphere{% endblock %}
{% block page_title %}Modify Department Details{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header-custom">
        <h3 class="card-title-custom"><i class="bi bi-pencil-square"></i> Modify {{ department.department_name }}</h3>
        <a href="{{ url_for('department.list_departments') }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Cancel
        </a>
    </div>
    
    <form action="{{ url_for('department.edit_department', department_id=department.department_id) }}" method="POST">
        <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px;">
            <!-- Department Name -->
            <div class="form-group">
                <label for="department_name" class="form-label">Department Name *</label>
                <input type="text" id="department_name" name="department_name" class="form-control" value="{{ department.department_name }}" required>
            </div>
            
            <!-- Manager Name -->
            <div class="form-group">
                <label for="manager_name" class="form-label">Manager Name</label>
                <input type="text" id="manager_name" name="manager_name" class="form-control" value="{{ department.manager_name or '' }}">
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('department.list_departments') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
