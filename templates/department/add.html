{% extends 'base.html' %}

{% block title %}Add Department - WorkSphere{% endblock %}
{% block page_title %}Create New Department{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header-custom">
        <h3 class="card-title-custom"><i class="bi bi-plus-square-fill"></i> Department Details</h3>
        <a href="{{ url_for('department.list_departments') }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
    
    <form action="{{ url_for('department.add_department') }}" method="POST">
        <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px;">
            <!-- Department Name -->
            <div class="form-group">
                <label for="department_name" class="form-label">Department Name *</label>
                <input type="text" id="department_name" name="department_name" class="form-control" placeholder="e.g. Engineering, HR, Sales" value="{{ form.get('department_name', '') }}" required>
            </div>
            
            <!-- Manager Name -->
            <div class="form-group">
                <label for="manager_name" class="form-label">Manager Name</label>
                <input type="text" id="manager_name" name="manager_name" class="form-control" placeholder="e.g. Amit Patel" value="{{ form.get('manager_name', '') }}">
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('department.list_departments') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Create Department
            </button>
        </div>
    </form>
</div>
{% endblock %}
