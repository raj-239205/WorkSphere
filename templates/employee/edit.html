{% extends 'base.html' %}

{% block title %}Edit Employee - WorkSphere{% endblock %}
{% block page_title %}Edit Employee Details{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header-custom">
        <h3 class="card-title-custom"><i class="bi bi-pencil-square"></i> Modify Details for {{ employee.name }}</h3>
        <a href="{{ url_for('employee.list_employees') }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Cancel
        </a>
    </div>
    
    <form action="{{ url_for('employee.edit_employee', emp_id=employee.emp_id) }}" method="POST">
        <div class="form-grid">
            <!-- Full Name -->
            <div class="form-group">
                <label for="name" class="form-label">Full Name *</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ employee.name }}" required>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label for="email" class="form-label">Email Address *</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ employee.email }}" required>
            </div>
            
            <!-- Phone -->
            <div class="form-group">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="text" id="phone" name="phone" class="form-control" value="{{ employee.phone or '' }}">
            </div>
            
            <!-- Department -->
            <div class="form-group">
                <label for="department_id" class="form-label">Department *</label>
                <select id="department_id" name="department_id" class="form-control" required>
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.department_id }}" {{ 'selected' if employee.department_id == dept.department_id }}>
                        {{ dept.department_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <!-- Designation -->
            <div class="form-group">
                <label for="designation" class="form-label">Designation</label>
                <input type="text" id="designation" name="designation" class="form-control" value="{{ employee.designation or '' }}">
            </div>
            
            <!-- Salary -->
            <div class="form-group">
                <label for="salary" class="form-label">Base Salary ($) *</label>
                <input type="number" step="0.01" id="salary" name="salary" class="form-control" value="{{ employee.salary }}" required>
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('employee.list_employees') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
