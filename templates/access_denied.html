<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - 403</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="glass-card auth-card text-center" style="text-align: center;">
        <div style="font-size: 4.5rem; color: var(--danger); margin-bottom: 20px; line-height: 1;">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1 style="font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 12px; color: var(--danger);">
            403 - Forbidden
        </h1>
        <p style="color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem;">
            You do not have the required permissions to view this resource. If you believe this is an error, please contact your administrator.
        </p>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary" style="width: 100%;">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</body>
</html>
