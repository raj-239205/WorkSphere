<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkSphere</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body class="auth-page">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h1>WorkSphere</h1>
            <p>Workforce & Productivity Platform</p>
        </div>
        
        <!-- Flash Messages inside Login Card -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="alert-container">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'error' else 'danger' }}">
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="username" class="form-label">Username</label>
                <div style="position: relative;">
                    <i class="bi bi-person" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dark);"></i>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" style="padding-left: 40px;" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 32px;">
                <label for="password" class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="bi bi-lock" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dark);"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" style="padding-left: 40px;" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Log In <i class="bi bi-arrow-right-short"></i>
            </button>
        </form>
    </div>
</body>
</html>
